# Netlify : on ignore le build TanStack/SSR et on publie uniquement
# l'app VacciCheck statique (HTML autonome dans /public).
# L'accès est protégé par une Edge Function (gate.ts) qui vérifie le
# token HMAC émis par ConseilSV.

[build]
  command = "echo 'Skip build — static HTML only'"
  publish = "public"

[[edge_functions]]
  path = "/*"
  function = "gate"

# Redirige la racine vers la dernière version du carnet
[[redirects]]
  from = "/"
  to = "/test_v45.html"
  status = 200

# Fallback : toute route inconnue tombe aussi sur V45
[[redirects]]
  from = "/*"
  to = "/test_v45.html"
  status = 200
